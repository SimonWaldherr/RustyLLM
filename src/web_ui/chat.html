<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RustyLLM Chat</title>

  <meta name="description" content="Simple chat interface for RustyLLM — local LLM inference.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light dark">

  <meta property="og:type" content="website">
  <meta property="og:title" content="RustyLLM Chat">
  <meta property="og:description" content="Simple chat interface for RustyLLM — local LLM inference.">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="RustyLLM Chat">
  <meta name="twitter:description" content="Simple chat interface for RustyLLM — local LLM inference.">

  <link rel="stylesheet" href="style.css">
</head>
<body class="chat">

<div class="app">
  <header role="banner">
    <h1>RustyLLM Chat</h1>
    <div class="top">
      <a href="/chat?expert">Expert UI</a>
      <div id="status" class="status" role="status" aria-live="polite">Ready</div>
    </div>
  </header>

  <main id="scroll" aria-label="Conversation">
    <div class="messages" id="messages" role="log" aria-label="Message history" aria-live="polite" aria-relevant="additions">
      <div class="empty" id="empty">Ask something to start a local chat.</div>
    </div>
  </main>

  <form id="form" aria-label="Chat input" novalidate>
    <div class="composer">
      <textarea
        id="prompt"
        name="prompt"
        rows="2"
        placeholder="Message RustyLLM"
        autofocus
        autocomplete="off"
        aria-required="true"
      ></textarea>
      <div class="actions">
        <button id="send" type="submit" aria-label="Send message">Send</button>
        <button id="stop" class="secondary" type="button" disabled aria-label="Stop generation">Stop</button>
      </div>
    </div>
    <div class="settings">
      <label>Max tokens <input id="maxTokens" type="number" min="1" max="4096" value="512" inputmode="numeric" autocomplete="off"></label>
      <label>Temperature
        <input id="temperature" type="range" min="0" max="2" step="0.05" value="0.7" aria-valuemin="0" aria-valuemax="2" aria-valuenow="0.7">
        <span id="tempValue">0.70</span>
      </label>
    </div>
  </form>
</div>

<noscript>
  <p style="padding:2rem;text-align:center;">RustyLLM Chat requires JavaScript to be enabled.</p>
</noscript>

<script src="script.js"></script>
</body>
</html>
