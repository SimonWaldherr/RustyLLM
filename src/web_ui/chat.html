<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RustyLLM Chat</title>

  <meta name="description" content="Chat with a local GGUF model through RustyLLM's built-in inference server.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#0f172a">

  <meta property="og:type" content="website">
  <meta property="og:title" content="RustyLLM Chat">
  <meta property="og:description" content="Chat with a local GGUF model through RustyLLM's built-in inference server.">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="RustyLLM Chat">
  <meta name="twitter:description" content="Chat with a local GGUF model through RustyLLM's built-in inference server.">

  <link rel="stylesheet" href="style.css">
</head>
<body class="chat">

<div id="announce" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<div class="app">
  <header role="banner">
    <div class="page-title">
      <h1>RustyLLM Chat</h1>
      <p>Local inference workspace</p>
    </div>
    <div class="top">
      <button id="history-toggle" class="ghost" type="button" aria-expanded="false" aria-controls="history-panel" aria-label="Toggle chat history">History</button>
      <button id="new-chat" class="ghost" type="button" aria-label="Start new chat">New chat</button>
      <nav class="page-nav" aria-label="RustyLLM web views">
        <a href="/chat" aria-current="page">Chat</a>
        <a href="/chat?expert">Expert</a>
        <a href="/explorer">Explorer</a>
      </nav>
      <div id="status" class="status" role="status" aria-live="polite">Ready</div>
    </div>
  </header>

  <div class="body">
    <nav class="history-panel" id="history-panel" aria-label="Chat history" hidden>
      <div class="history-heading">Recent chats</div>
      <div id="history-list" class="history-list" role="list" aria-label="Previous conversations"></div>
    </nav>

    <main id="scroll" aria-label="Conversation">
      <div class="messages" id="messages" role="log" aria-label="Message history" aria-live="polite" aria-relevant="additions">
        <div class="empty" id="empty">
          <p class="eyebrow">Ready when you are</p>
          <h2>What would you like to explore?</h2>
          <p>Start with a prompt below or write your own message.</p>
          <div class="suggestions" aria-label="Example prompts">
            <button type="button" class="suggestion">Explain quantum entanglement in simple terms</button>
            <button type="button" class="suggestion">Write a Python function to reverse a string</button>
            <button type="button" class="suggestion">What is the difference between TCP and UDP?</button>
          </div>
        </div>
      </div>
      <button id="scroll-btn" class="scroll-to-bottom" type="button" aria-label="Scroll to bottom" hidden>↓</button>
    </main>
  </div>

  <form id="form" aria-label="Chat input" novalidate>
    <div class="composer">
      <textarea
        id="prompt"
        name="prompt"
        rows="2"
        placeholder="Message RustyLLM"
        autofocus
        autocomplete="off"
        aria-required="true"
        aria-describedby="promptHint"
      ></textarea>
      <div class="actions">
        <button id="send" type="submit" aria-label="Send message">Send</button>
        <button id="stop" class="secondary" type="button" disabled aria-label="Stop generation">Stop</button>
      </div>
    </div>
    <div class="settings">
      <label>Max tokens <input id="maxTokens" type="number" min="1" max="4096" value="512" inputmode="numeric" autocomplete="off"></label>
      <label>Temperature
        <input id="temperature" type="range" min="0" max="2" step="0.05" value="0.7" aria-valuemin="0" aria-valuemax="2" aria-valuenow="0.7">
        <span id="tempValue">0.70</span>
      </label>
      <label class="toggle"><input id="thinking" type="checkbox" autocomplete="off"> Thinking</label>
      <div id="stats" class="stats" aria-live="polite" aria-atomic="true"></div>
    </div>
    <details id="thinkingDetails" class="thinking-details">
      <summary>Thinking prompt</summary>
      <textarea id="thinkingPrompt" rows="3" placeholder="Optional meta-prompt override" autocomplete="off"></textarea>
    </details>
    <div class="hint" id="promptHint">Press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> or <kbd>⌘</kbd>+<kbd>Enter</kbd> to send</div>
  </form>
</div>

<noscript>
  <p style="padding:2rem;text-align:center;">RustyLLM Chat requires JavaScript to be enabled.</p>
</noscript>

<script src="script.js"></script>
</body>
</html>
