<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RustyLLM Expert UI</title>

  <meta name="description" content="Advanced RustyLLM client for local GGUF chat, completions, embeddings, and RAG experiments.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#0f172a">

  <meta property="og:type" content="website">
  <meta property="og:title" content="RustyLLM Expert UI">
  <meta property="og:description" content="Advanced RustyLLM client for local GGUF chat, completions, embeddings, and RAG experiments.">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="RustyLLM Expert UI">
  <meta name="twitter:description" content="Advanced RustyLLM client for local GGUF chat, completions, embeddings, and RAG experiments.">

  <link rel="stylesheet" href="style.css">
</head>
<body class="expert">

<div id="announce" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<div class="app">
  <header role="banner">
    <h1>RustyLLM Expert UI</h1>
    <div class="top">
      <nav class="page-nav" aria-label="RustyLLM web views">
        <a href="/chat">Chat</a>
        <a href="/chat?expert" aria-current="page">Expert</a>
        <a href="/explorer">Explorer</a>
      </nav>
      <div id="status" class="status" role="status" aria-live="polite">Ready</div>
    </div>
  </header>

  <div class="workspace">
    <aside aria-label="Configuration panel">
      <form id="form" class="stack" aria-label="Inference settings" aria-busy="false" novalidate>

        <div class="field">
          <label for="mode">Mode</label>
          <select id="mode" name="mode" autocomplete="off">
            <option value="chat">Chat completions</option>
            <option value="completion">Text completions</option>
            <option value="generate">Generate</option>
            <option value="embeddings">Embeddings</option>
            <option value="rag">RAG Demo</option>
          </select>
        </div>

        <div class="field">
          <label for="model">Model</label>
          <select id="model" name="model" autocomplete="off" aria-describedby="modelHint"></select>
          <div class="hint" id="modelHint" aria-live="polite">Loading models…</div>
        </div>

        <div class="field">
          <label for="prompt">Input</label>
          <textarea
            id="prompt"
            name="prompt"
            rows="4"
            placeholder="Message RustyLLM"
            autofocus
            autocomplete="off"
            aria-required="true"
            aria-describedby="promptHint"
          ></textarea>
          <div class="hint" id="promptHint">Press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> or <kbd>⌘</kbd>+<kbd>Enter</kbd> to send</div>
        </div>

        <details id="advanced">
          <summary>Advanced settings</summary>
          <div class="inner-stack">

            <div class="field">
              <label for="systemPrompt">System prompt</label>
              <textarea id="systemPrompt" rows="2" placeholder="Optional system prompt" autocomplete="off"></textarea>
            </div>

            <label class="inline">
              <input id="thinking" type="checkbox" autocomplete="off">
              Thinking
            </label>

            <div class="field">
              <label for="thinkingPrompt">Thinking prompt</label>
              <textarea id="thinkingPrompt" rows="3" placeholder="Optional meta-prompt override" autocomplete="off"></textarea>
            </div>

            <div class="field">
              <label for="thinkingMaxTokens">Thinking max tokens</label>
              <input id="thinkingMaxTokens" type="number" min="1" max="1024" value="192" inputmode="numeric" autocomplete="off">
            </div>

            <div class="row">
              <div class="field">
                <label for="maxTokens">Max tokens</label>
                <input id="maxTokens" type="number" min="1" max="4096" value="512" inputmode="numeric" autocomplete="off">
              </div>
              <div class="field">
                <label for="seed">Seed</label>
                <input id="seed" type="number" min="0" placeholder="time" inputmode="numeric" autocomplete="off">
              </div>
            </div>

            <div class="field">
              <label for="temperature">Temperature <span id="tempValue" aria-live="off">0.70</span></label>
              <input
                id="temperature"
                type="range"
                min="0" max="2" step="0.05" value="0.7"
                aria-valuemin="0" aria-valuemax="2" aria-valuenow="0.7" aria-valuetext="0.70"
              >
            </div>

            <div class="row">
              <div class="field">
                <label for="topP">Top P</label>
                <input id="topP" type="number" min="0" max="1" step="0.01" value="0.9" inputmode="decimal" autocomplete="off">
              </div>
              <div class="field">
                <label for="topK">Top K</label>
                <input id="topK" type="number" min="0" max="1000" value="40" inputmode="numeric" autocomplete="off">
              </div>
            </div>

            <div class="field">
              <label for="repeatPenalty">Repeat penalty</label>
              <input id="repeatPenalty" type="number" min="0" max="4" step="0.05" value="1.1" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="stop">Stop strings</label>
              <textarea id="stop" rows="2" placeholder="One per line" autocomplete="off"></textarea>
            </div>

            <label class="inline">
              <input id="stream" type="checkbox" checked>
              Stream when supported
            </label>

          </div>
        </details>

        <div class="actions" role="group" aria-label="Session controls">
          <button id="send" type="submit" aria-label="Send message">Send</button>
          <button id="abort" class="secondary" type="button" disabled aria-label="Stop generation">Stop</button>
          <button id="clear" class="secondary" type="button" aria-label="Clear conversation history">Clear</button>
          <button id="refresh" class="secondary" type="button" aria-label="Refresh model list">Refresh</button>
        </div>

      </form>
    </aside>

    <main id="scroll" aria-label="Conversation">
      <div id="transcript-panel">
        <div class="stats" id="stats" aria-live="polite" aria-atomic="true"></div>
        <div
          class="transcript"
          id="messages"
          role="log"
          aria-label="Message history"
          aria-live="polite"
          aria-relevant="additions"
        >
          <div class="empty" id="empty">
            Use the controls to try chat, completions, generate, embeddings, model listing, health, and streaming.
          </div>
        </div>
      </div>

      <div id="rag-panel" hidden aria-label="RAG Demo">
        <div class="rag-columns">
          <section class="rag-kb" aria-label="Knowledge base">
            <h2>Knowledge Base <span id="rag-kb-count" class="rag-badge">0</span></h2>
            <div class="field">
              <label for="rag-passage">Passage</label>
              <textarea id="rag-passage" rows="5" placeholder="Paste a passage to add to the knowledge base…" autocomplete="off"></textarea>
            </div>
            <button id="rag-add-btn" type="button">Add passage</button>
            <div id="rag-kb-list" class="rag-kb-list" aria-label="Knowledge base entries" aria-live="polite"></div>
          </section>

          <section class="rag-search" aria-label="Semantic search">
            <h2>Semantic Search</h2>
            <div class="field">
              <label for="rag-query">Query</label>
              <input id="rag-query" type="text" placeholder="Search the knowledge base…" autocomplete="off">
            </div>
            <button id="rag-search-btn" type="button">Search</button>
            <div id="rag-results" class="rag-results" aria-live="polite" aria-label="Search results"></div>
            <button id="rag-ask-btn" type="button" hidden>Answer with LLM</button>
            <div id="rag-answer" class="rag-answer" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </main>
  </div>
</div>

<noscript>
  <p style="padding:2rem;text-align:center;">RustyLLM Expert UI requires JavaScript to be enabled.</p>
</noscript>

<script src="script.js"></script>
</body>
</html>
