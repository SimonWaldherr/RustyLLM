name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    if: ${{ github.actor != 'nektos/act' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
            binary: rusty-llm
          - os: macos-latest
            target_name: macos-native
            binary: rusty-llm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          token: ${{ github.token }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain none
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0

      - name: Cache Cargo
        if: ${{ env.ACT != 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --features full

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          cp README.md LICENSE dist/
          tar -czf "rusty-llm-${{ github.ref_name }}-${{ matrix.target_name }}.tar.gz" -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusty-llm-${{ matrix.target_name }}
          path: rusty-llm-${{ github.ref_name }}-${{ matrix.target_name }}.tar.gz

  publish:
    name: Publish GitHub release
    if: ${{ github.actor != 'nektos/act' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.tar.gz
