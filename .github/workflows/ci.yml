name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          token: ${{ github.token }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain none
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install \
            --profile minimal \
            --component rustfmt \
            --component clippy \
            --target wasm32-unknown-unknown

      - name: Cache Cargo
        if: ${{ env.ACT != 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --features full -- -D warnings

      - name: Run tests
        run: cargo test --features full

      - name: Check native feature combinations
        shell: bash
        run: |
          set -euxo pipefail
          cargo check --no-default-features --lib
          cargo check --no-default-features --features cli --bins
          cargo check --no-default-features --features server --lib
          cargo check --no-default-features --features cli,server --bin rusty-llm
          cargo check --no-default-features --features cli,server,tls --bin rusty-llm
          cargo check --no-default-features --features cli,server,tls,metal --bin rusty-llm

      - name: Check all features
        run: cargo check --all-targets --all-features

      - name: Check wasm feature
        run: cargo check --no-default-features --features wasm --target wasm32-unknown-unknown --lib
