name: Deploy WASM demo

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/pages.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - "rust-toolchain.toml"
      - "src/**"
      - "demo/wasm/**"
      - "!demo/wasm/pkg/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build WASM demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          token: ${{ github.token }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain none
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install 1.85.0 \
            --profile minimal \
            --target wasm32-unknown-unknown
          rustup default 1.85.0

      - name: Cache Cargo
        if: ${{ env.ACT != 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Build wasm-bindgen web package
        run: make wasm

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          cp demo/wasm/index.html _site/index.html
          cp -R demo/wasm/pkg _site/pkg
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        if: ${{ env.ACT != 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ github.actor != 'nektos/act' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
